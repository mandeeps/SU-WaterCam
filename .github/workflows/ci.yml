name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install CI test dependencies
        run: |
          pip install \
            pytest \
            numpy Pillow brotli \
            bitstring bitarray \
            pyserial requests \
            pympler \
            sortedcontainers intervaltree \
            dill multiprocess \
            astor astunparse

      - name: Run TickTalkPython compile tests
        run: |
          python -m pytest tests/test_ticktalk_compile.py -v --tb=short

      - name: Run workflow integration tests
        run: |
          python -m pytest tests/test_workflow_integration.py -v --tb=short

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_battery_manager.py \
            tests/test_lora_param_validation.py \
            tests/test_ip_command_handling.py \
            -v --tb=short \
            -k "not TestLoRaPacketEncoding"
